<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Morph</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <span class="title-bar-text">Morph.exe - Active</span>
        </div>

        <div class="content">
            <div class="video-frame-container">
                {% if use_server_camera %}
                <img src="{{ url_for('video_feed') }}" class="video-feed" alt="Camera Feed">
                {% else %}
                <video id="video" autoplay playsinline muted style="display: none;"></video>
                <canvas id="capture" style="display: none;"></canvas>
                <img id="output" class="video-feed" alt="Camera Feed Loading..." src="">
                {% endif %}
            </div>

            <div class="status-panel">
                <div class="status-line">
                    <span class="checkbox-fake checked"></span> Camera Input Signal
                </div>
                <div class="status-line">
                    <span class="checkbox-fake checked"></span> Face Tracking Daemon
                </div>
                <div class="status-line">
                    <span class="checkbox-fake checked"></span> Morph Synthesis Engine
                </div>
            </div>

            <br><br>
        </div>
    </div>

    <script>
        {% if not use_server_camera %}
        async function startCamera() {
            const video = document.getElementById("video");
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
            await video.play();
        }

        async function sendFrame() {
            const video = document.getElementById("video");
            const canvas = document.getElementById("capture");
            const output = document.getElementById("output");

            if (!video.videoWidth) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            ctx.drawImage(video, 0, 0);

            const dataUrl = canvas.toDataURL("image/jpeg", 0.6);

            try {
                const resp = await fetch("/process_frame", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: dataUrl })
                });

                const text = await resp.text();
                let result;
                try { 
                    result = JSON.parse(text); 
                } catch (e) {
                    output.alt = "JSON Parse Error. Server Status: " + resp.status + " | " + text.substring(0, 100);
                    return;
                }

                if (result.image) {
                    output.src = result.image;
                } else if (result.error) {
                    output.alt = "Backend Error: " + result.error;
                    console.error(result.trace);
                } else {
                    output.alt = "Server responded with empty image and no error.";
                }
            } catch (err) {
                output.alt = "Frontend Network Error: " + err.message;
                console.error("Error sending frame:", err);
            }
        }

        startCamera().then(() => {
            window.sendFrameInterval = setInterval(sendFrame, 200);
        }).catch(err => {
            console.error("Camera access denied or unavailable", err);
        });
        {% endif %}

        let roundEnded = false;
        function triggerEndRound() {
            if (roundEnded) return;
            roundEnded = true;

            // Stop frontend polling to save resources
            {% if not use_server_camera %}
            if (window.sendFrameInterval) clearInterval(window.sendFrameInterval);
            const videoElement = document.getElementById("video");
            if (videoElement) videoElement.pause();
            {% endif %}

            let imgElement = document.getElementById("output");
            if (!imgElement) imgElement = document.querySelector(".video-feed");

            // Fetch the grid result and show it automatically
            fetch('/grid_result')
                .then(res => {
                    if (res.ok) {
                        return res.blob();
                    }
                    throw new Error("Grid not ready");
                })
                .then(blob => {
                    imgElement.src = URL.createObjectURL(blob);
                    
                    // Display the result for 5 seconds before jumping to the next round
                    setTimeout(() => {
                        window.location.href = "/restart";
                    }, 5000);
                })
                .catch(err => {
                    console.error(err);
                    // Jump to next round immediately if result is missing (fallback)
                    window.location.href = "/restart";
                });
        }

        const checkInterval = setInterval(() => {
            fetch('/status')
                .then(res => res.json())
                .then(data => {
                    if (data.complete) {
                        clearInterval(checkInterval);
                        triggerEndRound();
                    }
                });
        }, 1000);

        // Fallback: If 30 seconds pass and the round hasn't naturally completed, force cycle
        setTimeout(() => {
            triggerEndRound();
        }, 30000);
    </script>
</body>

</html>
