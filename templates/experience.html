<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Morph</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <span class="title-bar-text">Morph.exe - Active</span>
        </div>

        <div class="content">
            <div class="video-frame-container">
                {% if use_server_camera %}
                <img src="{{ url_for('video_feed') }}" class="video-feed" alt="Camera Feed">
                {% else %}
                <video id="video" autoplay playsinline muted style="display: none;"></video>
                <canvas id="capture" style="display: none;"></canvas>
                <img id="output" class="video-feed" alt="Camera Feed Loading..." src="">
                {% endif %}
            </div>

            <div class="status-panel">
                <div class="status-line">
                    <span class="checkbox-fake checked"></span> Camera Input Signal
                </div>
                <div class="status-line">
                    <span class="checkbox-fake checked"></span> Face Tracking Daemon
                </div>
                <div class="status-line">
                    <span class="checkbox-fake checked"></span> Morph Synthesis Engine
                </div>
            </div>

            <!-- Selection screen disabled -->
            
            <br><br>
            <div id="resultContainer" style="display:none; text-align:center; gap: 10px; flex-direction: column;">
                <a href="/grid_result" class="btn" target="_blank" style="padding: 10px 20px; font-size: 1.2rem; background: #ffffaa;">SHOW RESULT (3x3 GRID) &gt;&gt;</a>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                    <a href="/restart" class="btn" style="padding: 10px 20px; font-size: 1rem; background: #aaf;">START NEXT ROUND</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        {% if not use_server_camera %}
        async function startCamera() {
            const video = document.getElementById("video");
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
            await video.play();
        }

        async function sendFrame() {
            const video = document.getElementById("video");
            const canvas = document.getElementById("capture");
            const output = document.getElementById("output");

            if (!video.videoWidth) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            ctx.drawImage(video, 0, 0);

            const dataUrl = canvas.toDataURL("image/jpeg", 0.6);

            try {
                const resp = await fetch("/process_frame", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: dataUrl })
                });

                const result = await resp.json();
                if (result.image) {
                    output.src = result.image;
                }
            } catch (err) {
                console.error("Error sending frame:", err);
            }
        }

        startCamera().then(() => {
            setInterval(sendFrame, 200);
        }).catch(err => {
            console.error("Camera access denied or unavailable", err);
        });
        {% endif %}

        const checkInterval = setInterval(() => {
            fetch('/status')
                .then(res => res.json())
                .then(data => {
                    if (data.complete) {
                        clearInterval(checkInterval);
                        document.getElementById('resultContainer').style.display = 'flex';
                    }
                });
        }, 1000);
    </script>
</body>

</html>
